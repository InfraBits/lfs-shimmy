name: Release
on: { push: { branches: [ main ] } }
jobs:
  setup-build:
    permissions:
      contents: read
    uses: infrabits/ci-generate-version/.github/workflows/from-git.yml@6ab2e5689783fe4dfdd4bbe0767cde6890965e9b # main

  build-container:
    runs-on: ubuntu-latest
    needs: [setup-build]
    permissions:
      contents: read
      packages: write
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build container
        uses: infrabits/ci-pack@c72247fc9ba1598090115c1d099e5c779b8bc79c # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image: ghcr.io/${{ github.repository }}:${{ needs.setup-build.outputs.version }}
          runtime_release: ${{ needs.setup-build.outputs.version }}
          use_builder: upstream

  create-release:
    runs-on: ubuntu-latest
    needs: [setup-build, build-container]
    steps:
      - name: Create GitHub release
        uses: infrabits/ci-create-missing-release@9b9b256bbdf59a093f847f2d7fa18700eaadffa1 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.setup-build.outputs.version }}
