name: Release
on: { push: { branches: [ main ] } }
jobs:
  setup-build:
    permissions:
      contents: read
    uses: infrabits/ci-generate-version/.github/workflows/from-git.yml@main

  build-container:
    runs-on: ubuntu-latest
    needs: [setup-build]
    permissions:
      contents: read
      packages: write
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Build container
        uses: infrabits/ci-pack@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image: ghcr.io/${{ github.repository }}:${{ needs.setup-build.outputs.version }}
          runtime_release: ${{ needs.setup-build.outputs.version }}
          use_builder: upstream

  create-release:
    runs-on: ubuntu-latest
    needs: [setup-build, build-container]
    steps:
      - name: Create GitHub release
        uses: infrabits/ci-create-missing-release@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.setup-build.outputs.version }}
